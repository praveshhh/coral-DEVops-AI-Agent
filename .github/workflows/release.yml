name: Release
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build and upload artifacts for (e.g. v0.1.4)"
        required: true
        type: string
permissions:
  contents: read
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-ui:
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.event.release.tag_name || inputs.tag }}
    outputs:
      has-ui: ${{ steps.detect-ui.outputs.has-ui }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.TAG_NAME }}
          persist-credentials: false
      - name: Detect UI package
        id: detect-ui
        run: |
          if [ -f ui/package.json ]; then
            echo "has-ui=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-ui=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up Node
        if: steps.detect-ui.outputs.has-ui == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ui/.node-version
          package-manager-cache: false
      - name: Install UI dependencies
        if: steps.detect-ui.outputs.has-ui == 'true'
        run: npm ci --prefix ui
      - name: Build UI
        if: steps.detect-ui.outputs.has-ui == 'true'
        run: npm run build --prefix ui
      - name: Verify UI entrypoint
        if: steps.detect-ui.outputs.has-ui == 'true'
        run: test -s ui/dist/index.html
      - name: Upload UI artifact
        if: steps.detect-ui.outputs.has-ui == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ui-dist
          path: ui/dist

  build:
    needs: build-ui
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    env:
      TAG_NAME: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.TAG_NAME }}
          persist-credentials: false
      - name: Install Rust toolchain
        run: rustup show
      - name: Ensure target is installed
        run: rustup target add ${{ matrix.target }}
      - name: Download UI artifact
        if: needs.build-ui.outputs.has-ui == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ui-dist
          path: ui/dist
      # No Rust cache here — release builds must compile from a clean state
      # to guard against cache poisoning attacks.
      - name: Install cross
        if: matrix.cross
        run: |
          set -euo pipefail
          cargo install cargo-binstall --locked
          cargo binstall --no-confirm --force --disable-strategies compile cross@0.2.5
      - name: Build Unix
        if: runner.os != 'Windows'
        shell: bash
        env:
          CROSS: ${{ matrix.cross }}
          HAS_UI: ${{ needs.build-ui.outputs.has-ui }}
          TARGET: ${{ matrix.target }}
        run: |
          feature_args=()
          if [ "$HAS_UI" = "true" ]; then
            feature_args=(--features embedded-ui)
          fi

          if [ "$CROSS" = "true" ]; then
            cross build --locked --release --target "$TARGET" "${feature_args[@]}"
          else
            cargo build --locked --release --target "$TARGET" "${feature_args[@]}"
          fi

      - name: Build Windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          HAS_UI: ${{ needs.build-ui.outputs.has-ui }}
          TARGET: ${{ matrix.target }}
        run: |
          $featureArgs = @()
          if ($env:HAS_UI -eq "true") {
            $featureArgs += @("--features", "embedded-ui")
          }

          cargo build --locked --release --target $env:TARGET @featureArgs

      - name: Smoke Windows release binary
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
        run: |
          $coral = "target\$env:TARGET\release\coral.exe"
          & $coral --version
          & $coral source discover

      - name: Package Unix
        if: runner.os != 'Windows'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          archive="coral-${TARGET}.tar.gz"
          cd "target/${TARGET}/release"
          tar czf "../../../${archive}" coral
          cd ../../../

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
        run: |
          $staging = "package-$env:TARGET"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "target\$env:TARGET\release\coral.exe" "$staging\coral.exe"
          Push-Location $staging
          Compress-Archive -Path coral.exe -DestinationPath "..\coral-$env:TARGET.zip" -Force
          Pop-Location

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coral-${{ matrix.target }}
          path: |
            coral-${{ matrix.target }}.tar.gz
            coral-${{ matrix.target }}.zip

  checksums:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: coral-*
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum coral-*.tar.gz > checksums.sha256
          sha256sum coral-*.zip >> checksums.sha256
          test -s checksums.sha256
      - name: Upload checksums
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: checksums
          path: artifacts/checksums.sha256

  publish-version:
    needs: checksums
    environment: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG_NAME: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: "{coral-*,checksums}"
          path: artifacts
          merge-multiple: true

      - name: Create GitHub App token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: github-app-token
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write
          repositories: |
            coral
            homebrew-tap

      - name: Upload artifacts to GitHub release
        env:
          GH_TOKEN: ${{ steps.github-app-token.outputs.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          artifacts=(artifacts/coral-*.tar.gz artifacts/coral-*.zip artifacts/checksums.sha256)
          if [ "${#artifacts[@]}" -lt 2 ]; then
            echo "No Coral release archives found" >&2
            exit 1
          fi
          gh release upload "$TAG_NAME" \
            "${artifacts[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

      - name: Promote GitHub release
        id: promote-release
        env:
          GH_TOKEN: ${{ steps.github-app-token.outputs.token }}
        run: |
          set -euo pipefail
          release_json="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG_NAME}")"
          release_id="$(printf '%s' "$release_json" | jq -r '.id')"
          was_prerelease="$(printf '%s' "$release_json" | jq -r '.prerelease')"

          if [ "$was_prerelease" = "true" ]; then
            release_json="$(gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              -F prerelease=false \
              -F make_latest=true)"
          fi

          {
            echo "was_prerelease=${was_prerelease}"
            echo "tag_name=$(printf '%s' "$release_json" | jq -r '.tag_name')"
            echo "release_name=$(printf '%s' "$release_json" | jq -r '.name // ""')"
            echo "release_url=$(printf '%s' "$release_json" | jq -r '.html_url')"
            echo "body<<__RELEASE_BODY__"
            printf '%s' "$release_json" | jq -r '.body // ""'
            echo "__RELEASE_BODY__"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.TAG_NAME }}
          fetch-depth: 0
          token: ${{ steps.github-app-token.outputs.token }}
          persist-credentials: false

      # Force push targets `docs` only — never `main`. Runs on both the
      # `release` event and manual `workflow_dispatch` against a tag, so docs
      # can be (re)pointed at a shipped tag by re-running this workflow.
      - name: Point docs branch at released commit
        env:
          GH_APP_TOKEN: ${{ steps.github-app-token.outputs.token }}
        run: |
          set -euo pipefail
          released_commit="$(git rev-parse "${TAG_NAME}^{commit}")"
          git push --force \
            "https://x-access-token:${GH_APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "${released_commit}:refs/heads/docs"

      # Dispatch the tap workflow after publishing the release:
      # https://octokit.github.io/rest.js/v22/#repos-create-dispatch-event
      - name: Trigger Homebrew tap bump
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          RELEASE_VERSION: ${{ env.TAG_NAME }}
        with:
          github-token: ${{ steps.github-app-token.outputs.token }}
          script: |
            const version = process.env.RELEASE_VERSION.replace(/^v/, "");
            await github.rest.repos.createDispatchEvent({
              owner: "withcoral",
              repo: "homebrew-tap",
              event_type: "coral-release",
              client_payload: { version },
            });

      - name: Post promoted release to Discord
        if: steps.promote-release.outputs.was_prerelease == 'true'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_CHANGELOG_WEBHOOK }}
          TAG_NAME: ${{ steps.promote-release.outputs.tag_name }}
          RELEASE_NAME: ${{ steps.promote-release.outputs.release_name }}
          RELEASE_BODY: ${{ steps.promote-release.outputs.body }}
          RELEASE_URL: ${{ steps.promote-release.outputs.release_url }}
        run: |
          MAX_LEN=3500
          BODY="$RELEASE_BODY"
          if [ ${#BODY} -gt $MAX_LEN ]; then
            BODY="${BODY:0:$MAX_LEN}..."
          fi

          TITLE_MAX_LEN=256
          TITLE="🪸 ${RELEASE_NAME:-$TAG_NAME}"
          if [ ${#TITLE} -gt $TITLE_MAX_LEN ]; then
            TITLE="${TITLE:0:$((TITLE_MAX_LEN - 3))}..."
          fi

          jq -n \
            --arg title "$TITLE" \
            --arg desc "$BODY" \
            --arg url "$RELEASE_URL" \
            '{
              embeds: [{
                title: $title,
                description: $desc,
                url: $url,
                color: 16744272,
                footer: { text: "Fresh from the reef" }
              }]
            }' | curl -sf -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK"
