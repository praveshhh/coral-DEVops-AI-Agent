  - name: providers
    description: >-
      Installed Airflow provider packages -- package name, version, and
      documentation URL for each provider installed in this Airflow environment.
    guide: |
      Each row is one installed provider package. `package_name` is the
      PyPI package name (e.g. apache-airflow-providers-amazon). `version`
      is the installed version. Use this table to audit which integrations
      are available and their versions.
    fetch_limit_default: 100
    request:
      method: GET
      path: /api/v2/providers
      query:
        - name: limit
          from: literal
          value: 100
        - name: offset
          from: state
          key: offset
    response:
      rows_path:
        - providers
      allow_404_empty: false
      row_strategy: direct
    pagination:
      mode: offset
      offset_param: offset
      offset_start: 0
      page_size:
        default: 100
        max: 100
        query_param: limit
    columns:
      - name: package_name
        type: Utf8
        nullable: false
        description: PyPI package name (e.g. apache-airflow-providers-amazon).
        expr:
          kind: path
          path:
            - package_name
      - name: description
        type: Utf8
        nullable: true
        description: Provider description.
        expr:
          kind: path
          path:
            - description
      - name: version
        type: Utf8
        nullable: true
        description: Installed provider version.
        expr:
          kind: path
          path:
            - version
      - name: documentation_url
        type: Utf8
        nullable: true
        description: URL to the provider's official documentation.
        expr:
          kind: path
          path:
            - documentation_url
