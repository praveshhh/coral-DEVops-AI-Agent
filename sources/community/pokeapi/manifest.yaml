        query_param: limit
    columns:
      - name: name
        type: Utf8
        description: Name of the type.
        nullable: true
        expr: {kind: path, path: [name]}
      - name: url
        type: Utf8
        description: Detail URL for the type.
        nullable: true
        expr: {kind: path, path: [url]}

  - name: abilities_list
    description: List Ability names and URLs.
    request:
      method: GET
