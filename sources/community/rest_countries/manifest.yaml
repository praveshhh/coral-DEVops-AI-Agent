      - name: area
        type: Float64
        description: Area of the country in square kilometers.
        nullable: true
        expr:
          kind: path
          path: [area]
      - name: flags_png
        type: Utf8
        description: URL to the country's flag in PNG format.
        nullable: true
        expr:
          kind: path
