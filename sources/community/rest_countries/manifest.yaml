          path: [subregion]
      - name: population
        type: Int64
        description: Population of the country.
        nullable: true
        expr:
          kind: path
          path: [population]
      - name: area
        type: Float64
        description: Area of the country in square kilometers.
        nullable: true
        expr:
          kind: path
          path: [area]
      - name: flags_png
        type: Utf8
        description: URL to the country's flag in PNG format.
        nullable: true
        expr:
          kind: path
          path: [flags, png]
      - name: currencies
        type: Json
        description: Currencies used in the country.
        nullable: true
        expr:
          kind: path
          path: [currencies]
      - name: languages
        type: Json
        description: Languages spoken in the country.
        nullable: true
        expr:
          kind: path
          path: [languages]

  - name: by_code
