        description: ISO 3166-1 alpha-3 code.
        nullable: true
        expr:
          kind: path
          path: [cca3]
      - name: region
        type: Utf8
        description: Region of the country.
        nullable: true
        expr:
          kind: path
          path: [region]
      - name: subregion
        type: Utf8
        description: Subregion of the country.
        nullable: true
        expr:
