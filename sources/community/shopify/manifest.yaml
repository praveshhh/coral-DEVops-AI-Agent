        description: Shopify API search query filter.
        expr:
          kind: from_filter
          key: query
      - name: include_inactive
        type: Boolean
        nullable: true
        virtual: true
        description: Include deactivated locations when true.
        expr:
          kind: from_filter
          key: include_inactive
      - name: include_legacy
        type: Boolean
        nullable: true
        virtual: true
        description: Include legacy fulfillment-service locations when true.
        expr:
          kind: from_filter
          key: include_legacy
      - name: id
        type: Utf8
        nullable: false
        description: Globally unique Shopify location ID.
        expr:
          kind: path
          path: [id]
      - name: name
        type: Utf8
        nullable: false
        description: Location name.
        expr:
          kind: path
          path: [name]
      - name: is_active
        type: Boolean
        nullable: true
        description: Whether the location is active.
        expr:
          kind: path
