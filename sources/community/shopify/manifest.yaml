  - name: customers
    description: Customer records in the Shopify store.
    guide: |
      Requires `read_customers` and may require protected customer data approval
      for non-development stores. Use the optional `query` filter with Shopify
      API search syntax, for example `email:buyer@example.com`,
      `state:enabled`, or `created_at:>=2026-01-01`.
    fetch_limit_default: 100
    filters:
      - name: query
        mode: search
    request:
      method: POST
      path: /graphql.json
      body:
        - path: [query]
          from: literal
          value: |
            query ShopifyCustomers($first: Int!, $after: String, $query: String) {
              customers(first: $first, after: $after, query: $query) {
                nodes {
                  id
                  displayName
                  firstName
                  lastName
                  createdAt
                  updatedAt
                  state
                  numberOfOrders
                  verifiedEmail
                  taxExempt
                  tags
                  amountSpent {
                    amount
                    currencyCode
                  }
                  defaultEmailAddress {
                    emailAddress
                    marketingState
                  }
                  defaultPhoneNumber {
                    phoneNumber
                    marketingState
                  }
                }
                pageInfo {
                  endCursor
                  hasNextPage
                }
              }
            }
        - path: [variables, first]
          from: literal
          value: 100
        - path: [variables, query]
          from: filter
          key: query
    response:
      rows_path: [data, customers, nodes]
      row_strategy: direct
    pagination:
      mode: cursor_body
      cursor_body_path: [variables, after]
      response_cursor_path: [data, customers, pageInfo, endCursor]
      page_size:
        default: 100
        max: 250
        body_path: [variables, first]
    columns:
      - name: query
        type: Utf8
        nullable: true
        virtual: true
        description: Shopify API search query filter.
        expr:
          kind: from_filter
          key: query
      - name: id
        type: Utf8
        nullable: false
        description: Globally unique Shopify customer ID.
        expr:
          kind: path
          path: [id]
      - name: display_name
        type: Utf8
        nullable: true
        description: Customer display name.
        expr:
          kind: path
          path: [displayName]
      - name: first_name
