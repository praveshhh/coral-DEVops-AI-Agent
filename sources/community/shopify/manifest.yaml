  - name: locations
    description: Shopify inventory locations where products can be stocked or fulfilled.
    guide: |
      Requires `read_locations` or an inventory-related scope. By default,
      Shopify returns active locations. Use `include_inactive` or
      `include_legacy` when you need deactivated or fulfillment-service
      locations. The optional `query` filter uses Shopify API search syntax.
    fetch_limit_default: 100
    filters:
      - name: query
        mode: search
      - name: include_inactive
      - name: include_legacy
    request:
      method: POST
      path: /graphql.json
      body:
        - path: [query]
          from: literal
          value: |
            query ShopifyLocations(
              $first: Int!,
              $after: String,
              $query: String,
              $includeInactive: Boolean,
              $includeLegacy: Boolean
            ) {
              locations(
                first: $first,
                after: $after,
                query: $query,
                includeInactive: $includeInactive,
                includeLegacy: $includeLegacy
              ) {
                nodes {
                  id
                  name
                  isActive
                  isFulfillmentService
                  fulfillsOnlineOrders
                  hasActiveInventory
                  shipsInventory
                  createdAt
                  updatedAt
                  address {
                    address1
                    address2
                    city
                    country
                    countryCode
                    province
                    provinceCode
                    zip
                  }
                  fulfillmentService {
                    handle
                    serviceName
                  }
                }
                pageInfo {
                  endCursor
                  hasNextPage
                }
              }
            }
        - path: [variables, first]
          from: literal
          value: 100
        - path: [variables, query]
          from: filter
          key: query
        - path: [variables, includeInactive]
          from: filter_bool
          key: include_inactive
        - path: [variables, includeLegacy]
          from: filter_bool
          key: include_legacy
    response:
