  - name: product_variations
    description: Variations of a variable product from /wp-json/wc/v3/products/{product_id}/variations
    guide: |
      Returns one row per variation of a variable product. For variable
      products WooCommerce keeps variation-level SKU, price, stock state,
      and attributes on these child rows тАФ `products.sku` and
      `products.stock_quantity` for a variable parent are empty by design.

      Requires `WHERE product_id = <id>` (the parent product ID). Get
      candidates with `SELECT id FROM woocommerce.products WHERE type = 'variable'`.

      `attributes` is the JSON array of `{id, name, slug, option}` chosen
      for that variation. `manage_stock` is a string with three possible
      values per the v3 API: `true`, `false`, or `parent` (inherit from
      the parent product); `stock_quantity` is null when stock is not
      tracked for the variation.
    filters:
      - name: product_id
        required: true
    request:
      method: GET
      path: /wp-json/wc/v3/products/{{filter.product_id}}/variations
    response:
      row_strategy: direct
    pagination:
      mode: page
      page_param: page
      page_start: 1
      page_step: 1
      page_size:
        default: 100
        max: 100
        query_param: per_page
    columns:
      - name: id
        type: Int64
        nullable: false
        description: Variation ID
        expr:
          kind: path
          path:
            - id
      - name: product_id
        type: Int64
        nullable: false
        description: Parent product ID; echoes the required WHERE product_id filter
        expr:
          kind: from_filter
          key: product_id
      - name: sku
        type: Utf8
        nullable: true
        description: Variation-level SKU
        expr:
          kind: path
          path:
            - sku
      - name: status
        type: Utf8
        nullable: true
        description: "Publish status: publish, private"
        expr:
          kind: path
          path:
            - status
      - name: price
        type: Utf8
        nullable: true
        description: Current price as a decimal string
        expr:
          kind: path
          path:
            - price
      - name: regular_price
        type: Utf8
        nullable: true
        description: Regular price as a decimal string
        expr:
          kind: path
          path:
            - regular_price
      - name: sale_price
        type: Utf8
        nullable: true
        description: Sale price as a decimal string; empty when not on sale
        expr:
          kind: path
          path:
            - sale_price
      - name: on_sale
        type: Boolean
        nullable: true
        description: Whether the variation is currently on sale
        expr:
          kind: path
          path:
            - on_sale
      - name: purchasable
        type: Boolean
        nullable: true
        description: Whether the variation can currently be purchased
        expr:
          kind: path
          path:
            - purchasable
      - name: manage_stock
        type: Utf8
        nullable: true
        description: "Stock-tracking mode: `true`, `false`, or `parent` (inherit from parent product)"
        expr:
          kind: path
          path:
            - manage_stock
      - name: stock_status
        type: Utf8
        nullable: true
        description: "Stock status: instock, outofstock, onbackorder"
        expr:
          kind: path
          path:
            - stock_status
      - name: stock_quantity
        type: Int64
        nullable: true
        description: Variation stock quantity; null when manage_stock is false
        expr:
          kind: path
          path:
            - stock_quantity
      - name: virtual
        type: Boolean
        nullable: true
        description: Whether the variation is a virtual product
        expr:
          kind: path
          path:
            - virtual
      - name: downloadable
        type: Boolean
        nullable: true
        description: Whether the variation is downloadable
        expr:
          kind: path
          path:
            - downloadable
      - name: permalink
        type: Utf8
        nullable: true
        description: Public URL of the variation
        expr:
          kind: path
          path:
            - permalink
      - name: attributes
        type: Json
        nullable: true
        description: Chosen attribute options for the variation as a JSON array
        expr:
          kind: path
          path:
            - attributes
      - name: date_created
        type: Timestamp
        nullable: true
        description: Variation creation time (UTC)
        expr:
          kind: format_timestamp
          input: iso8601
          expr:
            kind: template
            template: "{{expr.value}}Z"
            values:
              value:
                kind: path
                path:
                  - date_created_gmt
      - name: date_modified
        type: Timestamp
        nullable: true
        description: Variation last-modified time (UTC)
        expr:
          kind: format_timestamp
          input: iso8601
          expr:
            kind: template
            template: "{{expr.value}}Z"
            values:
              value:
                kind: path
                path:
                  - date_modified_gmt
