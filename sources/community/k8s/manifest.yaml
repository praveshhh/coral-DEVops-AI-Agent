          path: [type]
      - name: message
        type: Utf8
        expr:
          kind: path
          path: [message]
      - name: event_time
        type: Timestamp
        nullable: true
        description: events.k8s.io-style eventTime when present (single-occurrence events); RFC3339.
        expr:
          kind: format_timestamp
          input: iso8601
          expr:
            kind: path
            path: [eventTime]
      - name: first_timestamp
        type: Timestamp
        nullable: true
        description: core/v1 firstTimestamp; first observation of a repeated event (RFC3339).
        expr:
          kind: format_timestamp
          input: iso8601
          expr:
            kind: path
            path: [firstTimestamp]
      - name: last_timestamp
        type: Timestamp
        nullable: true
        description: core/v1 lastTimestamp; most recent observation of a repeated event (RFC3339).
        expr:
          kind: format_timestamp
