name: coingecko
version: 0.1.0
dsl_version: 3
backend: http
description: Fetch live cryptocurrency prices, market caps, and volumes from CoinGecko.
base_url: https://api.coingecko.com/api/v3
test_queries:
  - SELECT * FROM coingecko.markets WHERE vs_currency = 'usd' LIMIT 5
  - SELECT * FROM coingecko.trending LIMIT 5
  - SELECT * FROM coingecko.exchanges LIMIT 5
tables:
  - name: markets
    description: Fetch live market data for cryptocurrencies.
    fetch_limit_default: 250
    filters:
      - name: vs_currency
        required: true
      - name: ids
        required: false
    request:
      method: GET
      path: /coins/markets
      query:
        - name: vs_currency
          from: filter
          key: vs_currency
        - name: ids
          from: filter
          key: ids
    response:
      row_strategy: direct
    pagination:
      mode: page
      page_param: page
      page_start: 1
      page_size:
        default: 250
        max: 250
        query_param: per_page
    columns:
      - name: vs_currency
        type: Utf8
        expr: {kind: from_filter, key: vs_currency}
      - name: id
        type: Utf8
        expr: {kind: path, path: [id]}
      - name: symbol
        type: Utf8
        expr: {kind: path, path: [symbol]}
      - name: name
        type: Utf8
        expr: {kind: path, path: [name]}
      - name: current_price
        type: Float64
        expr: {kind: path, path: [current_price]}
      - name: market_cap
        type: Int64
        expr: {kind: path, path: [market_cap]}
      - name: market_cap_rank
        type: Int64
        expr: {kind: path, path: [market_cap_rank]}
      - name: total_volume
        type: Int64
        expr: {kind: path, path: [total_volume]}
      - name: high_24h
        type: Float64
        expr: {kind: path, path: [high_24h]}
      - name: low_24h
        type: Float64
        expr: {kind: path, path: [low_24h]}
      - name: price_change_percentage_24h
        type: Float64
        expr: {kind: path, path: [price_change_percentage_24h]}
      - name: circulating_supply
        type: Float64
        expr: {kind: path, path: [circulating_supply]}
      - name: total_supply
        type: Float64
        expr: {kind: path, path: [total_supply]}
      - name: last_updated
        type: Timestamp
        expr:
          kind: format_timestamp
          input: iso8601
          expr:
            kind: path
            path:
              - last_updated

  - name: trending
    description: Fetch the top trending cryptocurrencies.
    request:
      method: GET
      path: /search/trending
    response:
      rows_path: [coins]
      row_strategy: direct
    columns:
      - name: id
        type: Utf8
        expr: {kind: path, path: [item, id]}
      - name: name
        type: Utf8
        expr: {kind: path, path: [item, name]}
      - name: symbol
        type: Utf8
        expr: {kind: path, path: [item, symbol]}
      - name: market_cap_rank
        type: Int64
        nullable: true
        expr: {kind: path, path: [item, market_cap_rank]}
      - name: price_btc
        type: Float64
        nullable: true
        expr: {kind: path, path: [item, price_btc]}
      - name: score
        type: Int64
        expr: {kind: path, path: [item, score]}

  - name: exchanges
    description: Fetch list of cryptocurrency exchanges.
    fetch_limit_default: 100
    request:
      method: GET
      path: /exchanges
    response:
      row_strategy: direct
    pagination:
      mode: page
      page_param: page
      page_start: 1
      page_size:
        default: 100
        max: 250
        query_param: per_page
    columns:
      - name: id
        type: Utf8
        expr: {kind: path, path: [id]}
      - name: name
        type: Utf8
        expr: {kind: path, path: [name]}
      - name: year_established
        type: Int64
        nullable: true
        expr: {kind: path, path: [year_established]}
      - name: country
        type: Utf8
        nullable: true
        expr: {kind: path, path: [country]}
      - name: url
        type: Utf8
        nullable: true
        expr: {kind: path, path: [url]}
      - name: trust_score
        type: Int64
        nullable: true
        expr: {kind: path, path: [trust_score]}
      - name: trust_score_rank
        type: Int64
        nullable: true
        expr: {kind: path, path: [trust_score_rank]}
      - name: trade_volume_24h_btc
        type: Float64
        nullable: true
        expr: {kind: path, path: [trade_volume_24h_btc]}
