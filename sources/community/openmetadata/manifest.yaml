          separator: ","
      - name: owners
        type: Utf8
        nullable: true
        description: Comma-joined owner names.
        expr:
          kind: join_array_path
          path: [owners]
          item_path: [name]
          separator: ","
      - name: children
        type: Utf8
        nullable: true
        description: Comma-joined child team names.
        expr:
          kind: join_array_path
