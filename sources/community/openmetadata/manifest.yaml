      - name: followers
        type: Utf8
        nullable: true
        description: Comma-joined follower names.
        expr:
          kind: join_array_path
          path: [followers]
          item_path: [name]
          separator: ","
      - name: updated_at
        type: Timestamp
        nullable: true
        description: Last update timestamp.
        expr:
          kind: format_timestamp
          input: milliseconds
          expr: {kind: path, path: [updatedAt]}
      - name: updated_by
        type: Utf8
        nullable: true
        description: User that last updated the entity.
        expr: {kind: path, path: [updatedBy]}
      - name: deleted
        type: Boolean
        nullable: true
        description: Whether this entity is soft-deleted.
      - name: include
        type: Utf8
        nullable: true
        virtual: true
        description: Optional include filter, such as all, deleted, or non-deleted.
        expr:
          kind: from_filter
          key: include

  - name: users
    description: OpenMetadata users.
    guide: |
      Use this table to audit OpenMetadata users, teams, and roles. OpenMetadata
      returns non-deleted users by default; use `include = 'all'` or
      `include = 'deleted'` when auditing soft-deleted users.
    filters:
      - name: include
    request:
      method: GET
      path: /v1/users
      query:
        - name: fields
          from: literal
          value: teams,roles
        - name: include
          from: filter
          key: include
    response:
      rows_path: [data]
      row_strategy: direct
    pagination:
      mode: cursor_query
      cursor_param: after
      response_cursor_path: [paging, after]
      page_size:
