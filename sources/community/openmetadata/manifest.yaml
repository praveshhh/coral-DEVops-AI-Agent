          item_path: [name]
          separator: ","
      - name: policies
        type: Json
        nullable: true
        description: Policies associated with this team, when returned.
      - name: updated_at
        type: Timestamp
        nullable: true
        description: Last update timestamp.
        expr:
          kind: format_timestamp
          input: milliseconds
          expr: {kind: path, path: [updatedAt]}
      - name: updated_by
        type: Utf8
        nullable: true
