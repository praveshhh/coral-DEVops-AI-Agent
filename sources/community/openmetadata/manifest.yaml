      `include = 'all'` or `include = 'deleted'` when auditing soft-deleted
      teams.
    filters:
      - name: include
    request:
      method: GET
      path: /v1/teams
      query:
        - name: fields
          from: literal
          value: users,parents,owners,children,policies,domains
        - name: include
          from: filter
          key: include
    response:
      rows_path: [data]
      row_strategy: direct
    pagination:
      mode: cursor_query
      cursor_param: after
      response_cursor_path: [paging, after]
      page_size:
        default: 100
        max: 1000
        query_param: limit
    columns:
      - name: id
        type: Utf8
        nullable: false
        description: Team UUID.
      - name: name
        type: Utf8
        nullable: true
        description: Team name.
      - name: display_name
        type: Utf8
        nullable: true
        description: Display name.
        expr: {kind: path, path: [displayName]}
      - name: description
        type: Utf8
        nullable: true
        description: Team description.
      - name: team_type
        type: Utf8
        nullable: true
        description: OpenMetadata team type.
        expr: {kind: path, path: [teamType]}
      - name: email
        type: Utf8
        nullable: true
        description: Team email address.
      - name: users
        type: Utf8
        nullable: true
        description: Comma-joined user names.
        expr:
          kind: join_array_path
