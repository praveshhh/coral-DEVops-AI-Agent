      - name: titles_display
        type: Utf8
        nullable: true
        description: Formatted display title, may include HTML.
        expr:
          kind: path
          path:
            - titles
            - display
      - name: pageid
        type: Int64
        nullable: true
        description: Wikipedia page ID.
        expr:
          kind: path
          path:
            - pageid
      - name: lang
        type: Utf8
        nullable: true
        description: Language code (e.g. en).
        expr:
